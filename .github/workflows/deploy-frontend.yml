name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      DEPLOY_HOST: ${{ secrets.FRONTEND_DEPLOY_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: verimarka-frontend/package-lock.json

      - name: Install dependencies
        working-directory: verimarka-frontend
        run: npm ci --no-audit --no-fund

      - name: Create production env file
        working-directory: verimarka-frontend
        run: |
          cat > .env.production <<'EOF'
          VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}
          VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          VITE_GOOGLE_REDIRECT_URI=${{ secrets.VITE_GOOGLE_REDIRECT_URI }}
          VITE_WALLETCONNECT_PROJECT_ID=${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_KAKAO_CLIENT_ID=${{ secrets.VITE_KAKAO_CLIENT_ID }}
          EOF

      - name: Build
        working-directory: verimarka-frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure frontend EC2 instance is running
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION}" ]; then
            echo "AWS_REGION secret is required to start the frontend EC2 instance." >&2
            exit 1
          fi

          if [ -z "${EC2_INSTANCE_ID}" ]; then
            echo "EC2_INSTANCE_ID secret is required to start the EC2 instance." >&2
            exit 1
          fi

          state="$(aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)"

          case "${state}" in
            running)
              echo "Frontend EC2 instance is already running."
              ;;
            stopped)
              echo "Starting EC2 instance ${EC2_INSTANCE_ID}."
              aws ec2 start-instances --instance-ids "${EC2_INSTANCE_ID}" >/dev/null
              ;;
            stopping)
              echo "Frontend EC2 instance is stopping. Waiting before start."
              aws ec2 wait instance-stopped --instance-ids "${EC2_INSTANCE_ID}"
              aws ec2 start-instances --instance-ids "${EC2_INSTANCE_ID}" >/dev/null
              ;;
            pending)
              echo "Frontend EC2 instance is already starting."
              ;;
            *)
              echo "Frontend EC2 instance is in unsupported state: ${state}" >&2
              exit 1
              ;;
          esac

          aws ec2 wait instance-running --instance-ids "${EC2_INSTANCE_ID}"
          aws ec2 wait instance-status-ok --instance-ids "${EC2_INSTANCE_ID}"

          if [ -z "${DEPLOY_HOST}" ]; then
            resolved_host="$(aws ec2 describe-instances \
              --instance-ids "${EC2_INSTANCE_ID}" \
              --query 'Reservations[0].Instances[0].PublicDnsName' \
              --output text)"

            if [ -z "${resolved_host}" ] || [ "${resolved_host}" = "None" ]; then
              resolved_host="$(aws ec2 describe-instances \
                --instance-ids "${EC2_INSTANCE_ID}" \
                --query 'Reservations[0].Instances[0].PublicIpAddress' \
                --output text)"
            fi

            if [ -z "${resolved_host}" ] || [ "${resolved_host}" = "None" ]; then
              echo "Could not resolve a public host for frontend EC2 instance." >&2
              exit 1
            fi

            echo "DEPLOY_HOST=${resolved_host}" >> "${GITHUB_ENV}"
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.FRONTEND_DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts
        working-directory: .
        env:
          DEPLOY_PORT: ${{ secrets.FRONTEND_DEPLOY_PORT }}

      - name: Sync dist to server
        env:
          DEPLOY_PORT: ${{ secrets.FRONTEND_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.FRONTEND_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}
          STAGING_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}.__staging
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "rm -rf '${STAGING_PATH}' && mkdir -p '${STAGING_PATH}'"
          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT:-22}" \
            verimarka-frontend/dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGING_PATH}/"

      - name: Activate deployment with rollback
        env:
          DEPLOY_PORT: ${{ secrets.FRONTEND_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.FRONTEND_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}
          STAGING_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}.__staging
          BACKUP_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}.__backup
          RELOAD_COMMAND: ${{ secrets.FRONTEND_RELOAD_COMMAND }}
          HEALTHCHECK_URL: ${{ secrets.FRONTEND_HEALTHCHECK_URL }}
          HEALTHCHECK_RETRIES: ${{ secrets.FRONTEND_HEALTHCHECK_RETRIES }}
          HEALTHCHECK_INTERVAL_SECONDS: ${{ secrets.FRONTEND_HEALTHCHECK_INTERVAL_SECONDS }}
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "export DEPLOY_PATH='${DEPLOY_PATH}' STAGING_PATH='${STAGING_PATH}' BACKUP_PATH='${BACKUP_PATH}' RELOAD_COMMAND='${RELOAD_COMMAND}' HEALTHCHECK_URL='${HEALTHCHECK_URL:-https://verimarka.com/health/}' HEALTHCHECK_RETRIES='${HEALTHCHECK_RETRIES:-10}' HEALTHCHECK_INTERVAL_SECONDS='${HEALTHCHECK_INTERVAL_SECONDS:-5}'; bash -s" <<'EOF'
          set -euo pipefail

          rollback_executed=0

          reload_server() {
            local command="${RELOAD_COMMAND:-cd /opt/verimarka/verimarka-BACKEND && docker compose -f docker-compose.prod.yml exec -T verimarka-nginx nginx -s reload}"
            sh -lc "${command}"
          }

          run_healthcheck() {
            if [ -z "${HEALTHCHECK_URL}" ]; then
              return 0
            fi

            local retries="${HEALTHCHECK_RETRIES:-10}"
            local interval="${HEALTHCHECK_INTERVAL_SECONDS:-5}"
            local attempt

            for attempt in $(seq 1 "${retries}"); do
              if curl -fsS --max-time 10 "${HEALTHCHECK_URL}" >/dev/null; then
                echo "Healthcheck passed on attempt ${attempt}/${retries}"
                return 0
              fi
              echo "Healthcheck failed on attempt ${attempt}/${retries}"
              sleep "${interval}"
            done

            return 1
          }

          rollback() {
            if [ "${rollback_executed}" -eq 1 ]; then
              return
            fi

            rollback_executed=1
            echo "Deployment failed. Restoring previous frontend build."

            mkdir -p "${DEPLOY_PATH}"
            if [ -d "${BACKUP_PATH}" ]; then
              rsync -a --delete "${BACKUP_PATH}/" "${DEPLOY_PATH}/"
            fi

            rm -rf "${STAGING_PATH}"
            reload_server
          }

          trap 'status=$?; rollback; exit "${status}"' ERR

          rm -rf "${BACKUP_PATH}"
          mkdir -p "${DEPLOY_PATH}" "${BACKUP_PATH}"
          rsync -a --delete "${DEPLOY_PATH}/" "${BACKUP_PATH}/"

          rsync -a --delete "${STAGING_PATH}/" "${DEPLOY_PATH}/"
          rm -rf "${STAGING_PATH}"
          reload_server
          run_healthcheck

          rm -rf "${BACKUP_PATH}"
          EOF
        working-directory: .
